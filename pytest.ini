[pytest]
# pytest configuration for ScrapeMatrix v0.1.0+
# Phase 1: Testing & Stability (Iterations 1-50)

# Minimum Python version
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test discovery
testpaths = tests
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -ra

# Coverage options
# Run with: pytest --cov=src/scrapematrix --cov-report=html
# Check coverage with: coverage report

markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (may use I/O)
    performance: Performance tests (benchmarks)
    gui: GUI tests (requires PyQt6)
    rag: RAG system tests
    stock: Stock Viewer tests
    slow: Slow tests (marked for skipping in CI)
    serial: Tests that must run serially

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/pytest.log
log_file_level = DEBUG

# Timeout for tests (prevent hanging)
timeout = 300

# Minimum coverage for Phase 1
# Will be enforced in Iteration 5
# min_coverage = 80
